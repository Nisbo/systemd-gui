{% extends "base.html" %}
{% block content %}
  <section class="panel narrow login-panel">
    <div class="panel-head"><div><h2>Sign in</h2><p>Enter the Systemd Gui password.</p></div></div>
    <form class="form-grid single" method="post" action="{{ url_for('login_post') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <label>Password<input name="password" type="password" autofocus required></label>
      <div class="form-actions"><button class="primary-button" type="submit">Sign in</button></div>
    </form>
  </section>
{% endblock %}
